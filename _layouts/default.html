---
layout: compress
---

<!doctype html>
<html lang="en" class="no-js">
  <head>
    {% include head.html %}
    {% include head/custom.html %}
    <style>
      body,
      #particles-js {
        background:
          radial-gradient(circle at 20% 20%, rgba(107, 155, 255, 0.16), transparent 30%),
          radial-gradient(circle at 80% 0%, rgba(92, 214, 184, 0.14), transparent 28%),
          linear-gradient(135deg, #f5f8ff 0%, #fbfffe 52%, #eef8f4 100%);
        background-color: #f5f8ff;
      }

      .art-box-glass {
        position: relative;
        overflow: hidden;
        isolation: isolate;
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.7), rgba(255, 255, 255, 0.26)),
          rgba(255, 255, 255, 0.24);
        border-radius: 24px;
        box-shadow:
          0 22px 60px rgba(51, 80, 128, 0.18),
          inset 0 1px 0 rgba(255, 255, 255, 0.72);
        backdrop-filter: blur(22px) saturate(180%);
        -webkit-backdrop-filter: blur(22px) saturate(180%);
        border: 1px solid rgba(255, 255, 255, 0.62);
        padding: 25px 30px;
        margin: 20px 0;
        color: #24324a;
        transform: translate3d(0, 0, 0);
        will-change: transform, box-shadow;
        transition: transform 0.24s ease, box-shadow 0.24s ease, border-color 0.24s ease;
      }

      .art-box-glass:hover,
      .art-box-glass:active,
      .art-box-glass:focus-within {
        transform: translate3d(0, -6px, 0);
        border-color: rgba(255, 255, 255, 0.82);
        box-shadow:
          0 28px 68px rgba(51, 80, 128, 0.24),
          0 12px 26px rgba(51, 80, 128, 0.12),
          inset 0 1px 0 rgba(255, 255, 255, 0.8);
      }

      .art-box-glass::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at top left, rgba(255, 255, 255, 0.45), transparent 34%),
          linear-gradient(145deg, rgba(255, 255, 255, 0.14), transparent 58%);
        pointer-events: none;
        z-index: -1;
      }

      .masthead {
        background: rgba(255, 255, 255, 0.7) !important;
        backdrop-filter: blur(18px) saturate(180%);
        -webkit-backdrop-filter: blur(18px) saturate(180%);
        border-bottom: 1px solid rgba(255, 255, 255, 0.7);
        box-shadow:
          0 12px 30px rgba(30, 50, 90, 0.12),
          inset 0 1px 0 rgba(255, 255, 255, 0.72);
      }

      .masthead__inner-wrap {
        background: none !important;
      }

      .masthead__menu {
        background: none !important;
      }

      #site-nav {
        background: none !important;
      }

      .author__avatar {
        display: block !important;
        width: 100% !important;
        text-align: center;
      }

      .page__content > .art-box-glass:first-child,
      .page__content > p:first-child .art-box-glass:first-child {
        margin-top: 0;
      }

      .author__avatar img {
        display: block;
        margin: 0 auto;
        padding: 0 !important;
        border: 0 !important;
        border-radius: 22px !important;
        box-shadow:
          0 8px 22px rgba(51, 80, 128, 0.16),
          0 2px 6px rgba(51, 80, 128, 0.08);
        transition:
          transform 0.24s ease,
          box-shadow 0.24s ease;
        will-change: transform, box-shadow;
      }

      .author__avatar img:hover,
      .author__avatar img:active,
      .author__avatar img:focus {
        transform: translate3d(0, -4px, 0);
        box-shadow:
          0 16px 34px rgba(51, 80, 128, 0.22),
          0 6px 14px rgba(51, 80, 128, 0.12);
      }

      .masthead__menu-home-item {
        text-align: center;
        padding-right: 0 !important;
      }

      @media (min-width: 1200px) {
        .masthead__inner-wrap {
          position: relative;
        }
        .masthead__menu .visible-links li.masthead__menu-home-item {
          position: absolute !important;
          left: 0;
          top: 50%;
          transform: translateY(-50%);
          width: 25%;
          text-align: center;
          margin: 0 !important;
          padding: 0 !important;
        }
        .masthead__menu .visible-links li.masthead__menu-home-item a {
          display: inline-block !important;
          margin: 0 !important;
        }
        .masthead .greedy-nav {
          padding-left: 28%;
          box-sizing: border-box;
        }
        .masthead .greedy-nav .visible-links > li:nth-child(2) > a {
          margin-left: 0 !important;
        }
      }

      .author__content,
      .author__urls-wrapper {
        position: relative;
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.55), rgba(255, 255, 255, 0.22));
        border-radius: 18px;
        border: 1px solid rgba(255, 255, 255, 0.62);
        backdrop-filter: blur(14px) saturate(170%);
        -webkit-backdrop-filter: blur(14px) saturate(170%);
        box-shadow:
          0 8px 22px rgba(51, 80, 128, 0.12),
          inset 0 1px 0 rgba(255, 255, 255, 0.7);
        padding: 14px 18px;
        margin-top: 14px;
        transform: translate3d(0, 0, 0);
        will-change: transform, box-shadow;
        transition:
          transform 0.24s ease,
          box-shadow 0.24s ease,
          border-color 0.24s ease;
      }

      .author__content:hover,
      .author__content:active,
      .author__content:focus-within,
      .author__urls-wrapper:hover,
      .author__urls-wrapper:active,
      .author__urls-wrapper:focus-within {
        transform: translate3d(0, -4px, 0);
        border-color: rgba(255, 255, 255, 0.82);
        box-shadow:
          0 16px 34px rgba(51, 80, 128, 0.18),
          0 6px 14px rgba(51, 80, 128, 0.1),
          inset 0 1px 0 rgba(255, 255, 255, 0.82);
      }

      .author__content .author__name,
      .author__content .author__bio {
        margin: 0.25em 0;
      }

      .author__urls-wrapper .author__urls {
        margin-bottom: 0;
      }


      @media (min-width: 1200px) {
        .sidebar.sticky {
          width: 25% !important;
          margin-right: 3% !important;
        }
        .page {
          width: 72% !important;
          padding-left: 0 !important;
        }
      }

      .masthead .greedy-nav .visible-links a {
        position: relative;
        margin: 0 0.18rem;
        padding: 0.42rem 0.95rem;
        border-radius: 999px;
        font-weight: 500;
        color: #494e52;
        transition:
          color 0.22s ease,
          background-color 0.22s ease,
          transform 0.22s ease,
          box-shadow 0.22s ease;
      }

      .masthead .greedy-nav .visible-links a::before {
        display: none !important;
      }

      .masthead .greedy-nav .visible-links a::after {
        content: "";
        position: absolute;
        left: 50%;
        bottom: 0.18rem;
        height: 2px;
        width: 0;
        background: linear-gradient(90deg, #6366f1, #8b5cf6);
        border-radius: 999px;
        transition: width 0.26s ease, left 0.26s ease, opacity 0.26s ease;
        opacity: 0;
      }

      .masthead .greedy-nav .visible-links a:hover,
      .masthead .greedy-nav .visible-links a:focus-visible {
        color: #494e52;
        background: rgba(255, 255, 255, 0.55);
        transform: translateY(-1px);
        box-shadow:
          0 4px 12px rgba(40, 60, 100, 0.12),
          inset 0 1px 0 rgba(255, 255, 255, 0.85);
        outline: none;
      }

      .masthead .greedy-nav .visible-links a:hover::after,
      .masthead .greedy-nav .visible-links a:focus-visible::after {
        width: 56%;
        left: 22%;
        opacity: 0.6;
      }

      #main {
        padding-top: 80px;
      }

      #main [id] {
        padding-top: 80px;
        margin-top: -80px;
      }

      /* Match sidebar sticky offset to anchor offset so the avatar
         top aligns with the right card top after nav clicks. */
      .sidebar.sticky {
        top: 80px !important;
      }

      .reviewers-card a,
      .reviewers-card a:hover,
      .reviewers-card a:focus,
      .reviewers-card a:visited,
      .paper-box-text > p:first-of-type a,
      .paper-box-text > p:first-of-type a:hover,
      .paper-box-text > p:first-of-type a:focus,
      .paper-box-text > p:first-of-type a:visited {
        text-decoration: none !important;
        text-decoration-line: none !important;
        -webkit-text-decoration-line: none !important;
        border-bottom: none !important;
        box-shadow: none !important;
        background-image: none !important;
      }

      .hyp-pill {
        display: inline-flex;
        align-items: center;
        padding: 0.18em 0.78em;
        margin: 0 0.18em;
        border-radius: 999px;
        font-size: 0.74em;
        font-weight: 700;
        letter-spacing: 0.04em;
        line-height: 1.55;
        color: #fff;
        vertical-align: 0.08em;
        white-space: nowrap;
        border: 1px solid rgba(255, 255, 255, 0.42);
        box-shadow:
          0 2px 6px rgba(40, 60, 100, 0.18),
          0 1px 2px rgba(40, 60, 100, 0.08),
          inset 0 1px 0 rgba(255, 255, 255, 0.45);
        text-shadow: 0 1px 1px rgba(0, 0, 0, 0.14);
        user-select: none;
        transition: transform 0.18s ease, box-shadow 0.18s ease;
      }

      .hyp-pill:hover,
      .hyp-pill:active {
        transform: translateY(-1px);
        box-shadow:
          0 4px 10px rgba(40, 60, 100, 0.24),
          0 2px 4px rgba(40, 60, 100, 0.1),
          inset 0 1px 0 rgba(255, 255, 255, 0.55);
      }

      .hyp-pill.ccf-a {
        background: linear-gradient(135deg, #f47373 0%, #d23939 100%);
      }

      .hyp-pill.ccf-b {
        background: linear-gradient(135deg, #a78bfa 0%, #7c3aed 100%);
      }

      .hyp-pill.ccf-c {
        background: linear-gradient(135deg, #5eead4 0%, #0d9488 100%);
      }

      .hyp-pill.casq-1 {
        background: linear-gradient(135deg, #fcd34d 0%, #d97706 100%);
      }

      .gs-metrics {
        display: flex;
        gap: 0.85rem;
        align-items: center;
        flex-wrap: wrap;
        margin-top: 1.4rem;
        padding-top: 1.2rem;
        border-top: 1px solid rgba(81, 110, 168, 0.16);
      }

      .gs-metric {
        display: inline-flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 0.55rem 1.15rem 0.6rem;
        border-radius: 16px;
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.62), rgba(255, 255, 255, 0.3)),
          rgba(255, 255, 255, 0.18);
        border: 1px solid rgba(255, 255, 255, 0.55);
        box-shadow:
          0 6px 16px rgba(40, 60, 100, 0.1),
          inset 0 1px 0 rgba(255, 255, 255, 0.65);
        backdrop-filter: blur(10px) saturate(160%);
        -webkit-backdrop-filter: blur(10px) saturate(160%);
        min-width: 86px;
        transition: transform 0.22s ease, box-shadow 0.22s ease;
      }

      .gs-metric:hover,
      .gs-metric:active {
        transform: translateY(-2px);
        box-shadow:
          0 10px 22px rgba(40, 60, 100, 0.16),
          inset 0 1px 0 rgba(255, 255, 255, 0.75);
      }

      .gs-num {
        font-size: 1.55rem;
        font-weight: 700;
        line-height: 1;
        color: #1d3a73;
        letter-spacing: -0.01em;
        font-variant-numeric: tabular-nums;
      }

      .gs-label {
        font-size: 0.68rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #5a6b8a;
        margin-top: 0.32rem;
        font-weight: 600;
      }

      .gs-link,
      .gs-link:hover,
      .gs-link:focus,
      .gs-link:visited {
        display: inline-flex;
        align-items: center;
        margin-left: auto;
        padding: 0.5rem 1.1rem;
        border-radius: 999px;
        font-size: 0.78rem;
        font-weight: 600;
        letter-spacing: 0.02em;
        color: #fff !important;
        background: linear-gradient(135deg, rgba(57, 116, 255, 0.95), rgba(0, 54, 159, 0.92));
        box-shadow:
          0 6px 16px rgba(0, 54, 159, 0.22),
          inset 0 1px 0 rgba(255, 255, 255, 0.35);
        text-decoration: none !important;
        text-decoration-line: none !important;
        -webkit-text-decoration-line: none !important;
        border-bottom: none !important;
        background-image: linear-gradient(135deg, rgba(57, 116, 255, 0.95), rgba(0, 54, 159, 0.92)) !important;
        white-space: nowrap;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }

      .gs-link:hover,
      .gs-link:active {
        transform: translateY(-1px);
        box-shadow:
          0 10px 22px rgba(0, 54, 159, 0.3),
          inset 0 1px 0 rgba(255, 255, 255, 0.45);
      }

      /* ============================
         WeChat / X5 / older WebView fallbacks
         When backdrop-filter is not supported (WeChat X5, older Android Chrome),
         use a more opaque background so the glass cards stay readable.
         ============================ */
      html {
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
      }
      a, button {
        -webkit-tap-highlight-color: rgba(0, 0, 0, 0);
      }

      @supports not ((backdrop-filter: blur(2px)) or (-webkit-backdrop-filter: blur(2px))) {
        .art-box-glass {
          background: rgba(255, 255, 255, 0.92) !important;
        }
        .author__content,
        .author__urls-wrapper {
          background: rgba(255, 255, 255, 0.9) !important;
        }
        .masthead {
          background: rgba(255, 255, 255, 0.96) !important;
        }
      }

      /* ============================
         Tablet (≤1199px) tweaks
         ============================ */
      @media (max-width: 1199px) {
        /* Force vertical stack: avatar on top, name/contact cards below */
        .profile_box {
          display: block !important;
        }
        .author__avatar,
        .author__content,
        .author__urls-wrapper {
          display: block !important;
          width: 100% !important;
          max-width: 100% !important;
          padding-left: 0 !important;
        }
        .author__avatar {
          margin-bottom: 14px;
        }
        .author__avatar img {
          max-width: 175px;
        }

        /* Center text inside the two profile cards on small screens */
        .author__content,
        .author__urls-wrapper {
          text-align: center;
        }
        .sidebar .author__name,
        .sidebar .author__bio {
          text-align: center !important;
        }
        /* On small screens use the icon-only contact strip (.author__urls_sm),
           not the full text list. The full list (.author__urls) is the desktop
           dropdown — keep it hidden here to avoid duplicate display. */
        .author__urls {
          display: none !important;
        }
        .author__urls_sm {
          display: block !important;
          text-align: center !important;
          padding: 0.5em 0 !important;
          font-size: 1.55em !important;
        }
        .author__urls_sm a {
          display: inline-block;
          margin: 0 0.3em;
          color: inherit;
        }

        .art-box-glass {
          padding: 22px 24px;
          margin: 16px 0;
          border-radius: 22px;
        }
        .art-box-glass:hover {
          transform: translate3d(0, -4px, 0);
        }
        .author__content,
        .author__urls-wrapper {
          padding: 14px 16px;
          border-radius: 16px;
        }
        #main {
          padding-top: 70px;
        }
        #main [id] {
          padding-top: 70px;
          margin-top: -70px;
        }
      }

      /* ============================
         Phone (≤767px) tweaks
         ============================ */
      @media (max-width: 767px) {
        body {
          font-size: 15px;
          line-height: 1.55;
        }
        .art-box-glass {
          padding: 16px 14px;
          margin: 12px 0;
          border-radius: 18px;
          box-shadow:
            0 12px 30px rgba(51, 80, 128, 0.14),
            inset 0 1px 0 rgba(255, 255, 255, 0.65);
        }
        .page__content > .art-box-glass:first-child,
        .page__content > p:first-child .art-box-glass:first-child {
          margin-top: 12px;
        }

        .author__avatar img {
          max-width: 140px !important;
          min-width: 0 !important;
        }
        .author__content,
        .author__urls-wrapper {
          padding: 12px 14px;
          margin-top: 10px;
          border-radius: 14px;
        }

        .hyp-pill {
          font-size: 0.7em;
          padding: 0.14em 0.62em;
          margin: 0.12em 0.12em;
        }

        .masthead .greedy-nav .visible-links a {
          padding: 0.32rem 0.7rem;
          font-size: 0.92em;
        }

        #main {
          padding-top: 64px;
          padding-left: 0.6em;
          padding-right: 0.6em;
        }
        #main [id] {
          padding-top: 64px;
          margin-top: -64px;
        }

        .gs-metrics {
          gap: 0.55rem;
          margin-top: 1rem;
          padding-top: 0.9rem;
        }

        /* Paper box: stack image and text vertically on phone */
        .paper-box {
          display: block !important;
        }
        .paper-box-image,
        .paper-box-text {
          display: block !important;
          width: 100% !important;
          float: none !important;
          margin-bottom: 10px;
        }
        .paper-box-image img {
          max-width: 100%;
          height: auto;
        }

        /* Compact contact list */
        .author__urls li {
          white-space: normal;
          word-break: break-word;
        }
      }

      /* ============================
         Small phone (≤480px) tweaks
         ============================ */
      @media (max-width: 480px) {
        .art-box-glass {
          padding: 14px 12px;
          border-radius: 16px;
        }
        .author__avatar img {
          max-width: 120px !important;
        }
        .hyp-pill {
          font-size: 0.66em;
          padding: 0.12em 0.55em;
        }
      }

    </style>
  </head>

  <body>
    
    <!-- Particles.js container -->
    <div id="particles-js"></div>

    {% include browser-upgrade.html %}
    {% include masthead.html %}

    <div id="main" role="main">
      {% include sidebar.html %}
    
      <article class="page" itemscope itemtype="http://schema.org/CreativeWork">
        {% if page.title %}<meta itemprop="headline" content="{{ page.title | markdownify | strip_html | strip_newlines | escape_once }}">{% endif %}
        <div class="page__inner-wrap">
          <section class="page__content" itemprop="text">
            {{ content }}
          </section>
        </div>
      </article>
    </div>

    {% include scripts.html %}

  </body>
</html>
