name: Update Google Scholar Stats

on:
  schedule:
    - cron: "30 0 * * *"
  push:
    branches: [main]
    paths:
      - "google_scholar_crawler/**"
      - ".github/workflows/google-scholar-crawler.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: google_scholar_crawler
        run: pip install -r requirements.txt

      - name: Run crawler
        working-directory: google_scholar_crawler
        env:
          GOOGLE_SCHOLAR_ID: ${{ secrets.GOOGLE_SCHOLAR_ID }}
        run: python main.py

      - name: Deploy to google-scholar-stats branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./google_scholar_crawler/results
          publish_branch: google-scholar-stats
          force_orphan: true
          commit_message: "chore: update Google Scholar stats"
